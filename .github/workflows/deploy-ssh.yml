name: Деплой на сервер HostKey (SSH)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-ssh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Инструменты
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Собрать чистую папку сайта
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' --exclude '.github' --exclude 'scripts' --exclude 'server' \
            --exclude 'node_modules' --exclude '.agents' --exclude 'README.md' \
            --exclude '.gitignore' --exclude 'blog/_template.html' --exclude 'blog/topics.md' \
            ./ _site/

      - name: Настроить nginx и залить сайт
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          H: ${{ secrets.SSH_HOST }}
          U: ${{ secrets.SSH_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          RATES_ENDPOINT: ${{ secrets.RATES_ENDPOINT }}
        run: |
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"
          APB64="$(printf '%s' "$ADMIN_PASSWORD" | base64 -w0)"
          # разовая настройка nginx+PHP+cron (идемпотентно), с паролем админки и endpoint биржи
          sshpass -e ssh $OPTS "$U@$H" "ADMIN_PASSWORD_B64='$APB64' RATES_ENDPOINT='$RATES_ENDPOINT' bash -s" < server/remote-init.sh
          # выгрузить сайт (rates.json не трогаем — его пишет админка/крон)
          sshpass -e rsync -az --delete --exclude '.well-known' --exclude 'rates.json' -e "ssh $OPTS" _site/ "$U@$H:/var/www/buyusdt/"
          echo "Готово: сайт обновлён на http://$H"
