name: Ежедневная статья в блог

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 10:00 МСК, каждый день
  workflow_dispatch: {}     # ручной запуск из вкладки Actions

permissions:
  contents: write

jobs:
  write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Сгенерировать статью
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: https://buyusdtinvoice.ru
          MODEL: claude-sonnet-4-6
        run: node scripts/generate-article.mjs

      - name: Закоммитить, если что-то изменилось
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "Buy_USDTs Bot"
            git config user.email "bot@buyusdtinvoice.ru"
            git add -A
            git commit -m "blog: новая статья ($(date +%F))"
            git push
          else
            echo "Очередь пуста или изменений нет — пропускаю."
          fi

      # --- деплой на сервер (коммит ботом не триггерит deploy-ssh, поэтому деплоим тут же) ---
      - name: Инструменты деплоя
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Собрать чистую папку сайта
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' --exclude '.github' --exclude 'scripts' --exclude 'server' \
            --exclude 'node_modules' --exclude '.agents' --exclude 'README.md' \
            --exclude '.gitignore' --exclude 'blog/_template.html' --exclude 'blog/topics.md' \
            ./ _site/

      - name: Деплой на сервер
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          H: ${{ secrets.SSH_HOST }}
          U: ${{ secrets.SSH_USER }}
        run: |
          OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=20"
          sshpass -e ssh $OPTS "$U@$H" 'bash -s' < server/remote-init.sh
          sshpass -e rsync -az --delete --exclude '.well-known' -e "ssh $OPTS" _site/ "$U@$H:/var/www/buyusdt/"
          echo "Деплой завершён."
