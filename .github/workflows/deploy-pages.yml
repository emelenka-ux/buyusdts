name: Деплой сайта (GitHub Pages)

on:
  workflow_dispatch: {}   # запуск только вручную (основной деплой — на сервер HostKey через deploy-ssh.yml)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Собрать чистую папку сайта
        run: |
          mkdir -p _site
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'scripts' \
            --exclude 'node_modules' \
            --exclude '.agents' \
            --exclude 'README.md' \
            --exclude '.gitignore' \
            --exclude 'skills-lock.json' \
            --exclude 'blog/_template.html' \
            --exclude 'blog/topics.md' \
            ./ _site/
          # домен для GitHub Pages (custom domain)
          echo "buyusdt.ru" > _site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
