server {
    listen 80;
    listen [::]:80;
    server_name buyusdt.ru www.buyusdt.ru;

    root /var/www/buyusdt;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # не отдавать служебные файлы наружу
    location ~ ^/(scripts|server|\.git|\.github)/ { deny all; }
    location ~ /(topics\.md|_template\.html|README\.md|\.gitignore)$ { deny all; }

    # кэш статики
    location ~* \.(css|js|png|jpg|jpeg|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
